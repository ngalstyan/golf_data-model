# ==============================================================================
# GOLF BETTING MODEL — Conda Environment
# ==============================================================================
# 
# Setup:
#   conda env create -f environment.yml
#   conda activate golf_model
#
# Update after changes:
#   conda env update -f environment.yml --prune
#
# ==============================================================================

name: golf_model
channels:
  - conda-forge
  - defaults

dependencies:
  # --- Core Python ---
  - python=3.11

  # --- Data Handling ---
  - pandas>=2.0
  - numpy>=1.24
  - pyarrow>=14.0           # Fast Parquet I/O, pandas backend

  # --- Scientific Computing ---
  - scipy>=1.11
  - scikit-learn>=1.3

  # --- Visualization ---
  - matplotlib>=3.7
  - seaborn>=0.12

  # --- HTTP / API ---
  - requests>=2.31

  # --- Jupyter / VS Code ---
  - jupyter>=1.0
  - notebook>=7.0
  - ipykernel>=6.25
  - ipywidgets>=8.1

  # --- Testing ---
  - pytest>=7.4
  - pytest-cov>=4.1

  # --- Pip-only packages ---
  - pip:
    - pymc>=5.10             # Bayesian modeling (NUTS + ADVI)
    - arviz>=0.17            # Bayesian diagnostics & visualization
    - numba>=0.58            # JIT compilation for Monte Carlo loops
    - tenacity>=8.2          # Retry logic for API calls
    - tqdm>=4.66             # Progress bars
    - statsmodels>=0.14      # Diebold-Mariano, statistical tests
    - anthropic>=0.40        # Claude API for news research agent
    - beautifulsoup4>=4.12   # HTML text extraction for news articles
    - python-dotenv>=1.0     # .env file loading
